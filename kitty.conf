# --- Fuente ---
font_family      MesloLGS NF
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.0
disable_ligatures never

# --- Tema y Colores (Base oscuro simple) ---
background #2b303b
foreground #c0c5ce
cursor #c0c5ce
selection_background #4f5b66
selection_foreground #c0c5ce

# --- Cursor ---

# forma del cursor: block, underline, beam
cursor_shape underline
cursor_blink_interval 0

# Grosor del cursor (para beam/underline, en puntos)
cursor_underline_thickness 2.0



# --- Comportamiento de Ventana ---
remember_window_size yes
initial_window_width  1200
initial_window_height 800
window_padding_width  10

# --- Pestañas ---
tab_bar_edge bottom
# Usa 'slanted' si 'powerline' da error en tu versión
# tab_bar_style slanted
active_tab_font_style    bold
inactive_tab_font_style  normal

# --- Integración con Shell ---
shell_integration no-cursor

# --- Atajos ---
map ctrl+shift+enter new_window_with_cwd
map ctrl+shift+h new_os_window_with_cwd
map ctrl+shift+w close_window
map ctrl+shift+j next_window
map ctrl+shift+k previous_window

# --- Scrollback ---
scrollback_lines 10000
